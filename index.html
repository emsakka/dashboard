<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO DASHBOARD</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CRT Grain Overlay -->
    <div class="crt-grain"></div>

    <!-- HEADER -->
    <header class="crt-header">
        <h1>PORTFOLIO DASHBOARD</h1>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="layout">

        <!-- LEFT COLUMN -->
        <section class="left-column">

            <!-- Portfolio Values -->
            <div class="portfolio-values">
                <div class="value-box">
                    <label>Valore Portafoglio</label>
                    <span id="portfolioValue">—</span>
                </div>

                <div class="value-box">
                    <label>Totale Investito</label>
                    <span id="totalInvested">—</span>
                </div>

                <div class="value-box">
                    <label>Gain / Loss</label>
                    <span id="gainLoss">—</span>
                </div>
            </div>

            <!-- Allocation Blocks -->
            <div class="allocation-row">
                <div class="alloc-block" id="alloc-growth">Growth 40%</div>
                <div class="alloc-block" id="alloc-income">Income 40%</div>
                <div class="alloc-block" id="alloc-bond">Bond 10%</div>
                <div class="alloc-block" id="alloc-gold">Gold 5%</div>
                <div class="alloc-block" id="alloc-btc">BTC 5%</div>
            </div>

        </section>

        <!-- RIGHT COLUMN -->
        <section class="right-column">
            <div id="candlestickChart" class="chart-container"></div>
        </section>

    </main>

    <!-- SLIDE-IN PANEL -->
    <aside id="slidePanel" class="slide-panel">
        <div class="panel-header">
            <h2>Dettagli</h2>
            <button id="closePanel">✕</button>
        </div>
        <div class="panel-content" id="panelContent">
            <!-- JS will inject content -->
        </div>
    </aside>

    <!-- POPUP -->
    <div id="popup" class="popup hidden">
        <div class="popup-content" id="popupContent"></div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
